<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ATC Report Dashboard</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background: #f7f8fa; margin: 0; color: #1a1a1a; }
  header { padding: 24px 40px; font-weight: 700; font-size: 20px; border-bottom: 1px solid #e5e7eb; background: #fff; }
  .card { max-width: 640px; margin: 40px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; }
  h1 { font-size: 24px; margin: 0 0 6px; }
  p.sub { color: #6b7280; margin: 0 0 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 18px 0 6px; color: #374151; }
  input[type=file], input[type=text] { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
  .optional { color: #9ca3af; font-weight: 400; }
  button { margin-top: 26px; width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:disabled { background: #c7c7d1; cursor: not-allowed; }
  #status { margin-top: 20px; font-size: 14px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.queued, .pill.running { background: #fef3c7; color: #92400e; }
  .pill.done { background: #d1fae5; color: #065f46; }
  .pill.failed { background: #fee2e2; color: #991b1b; }
  ul#files { list-style: none; padding: 0; margin-top: 12px; }
  ul#files li a { display: block; padding: 10px 14px; margin-bottom: 8px; border: 1px solid #e5e7eb; border-radius: 8px; text-decoration: none; color: #4f46e5; font-weight: 600; }
  ul#files li a:hover { background: #f5f5ff; }
  #error { color: #991b1b; margin-top: 12px; font-size: 13px; white-space: pre-wrap; }
  .tabs { display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #374151; }
  .tab.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
</style>
</head>
<body>
<header>ATC Report Dashboard</header>
<div class="card">
  <h1>UTCL MTR Reports Dashboard</h1>
  <p class="sub">Pick a report, upload the input files it needs, and download the generated output.</p>

  <div class="tabs" id="tabs"></div>

  <form id="jobForm">
    <div id="fieldsContainer"></div>
    <button type="submit" id="submitBtn">Upload &amp; Run</button>
  </form>

  <div id="status"></div>
  <div id="error"></div>
  <ul id="files"></ul>
</div>

<script>
const API = "/api";

// Single source of truth for each report's inputs — labels/order match
// what that report actually needs (see backend/app.py's
// REPORT_REQUIRED_FILES, which this must stay in sync with).
const REPORTS = {
  mtr_analysis: {
    label: "MTR Analysis",
    fields: [
      { name: "run_date_label", type: "text", label: 'Run date label (e.g. "20 July")', placeholder: "20 July" },
      { name: "mtr_csv", type: "file", accept: ".csv", label: "Raw MTR CSV (XSwift export)" },
      { name: "consignment_xlsx", type: "file", accept: ".xlsx", label: "AT Consignment Report (.xlsx)" },
      { name: "primary_plants_xlsx", type: "file", accept: ".xlsx", label: "Primary Plants List (.xlsx)" },
    ],
  },
  trip_repush: {
    label: "Trip Repush",
    fields: [
      { name: "run_date_label", type: "text", label: 'Run date label (used as the tab name, e.g. "20 July")', placeholder: "20 July" },
      { name: "mtr_csv", type: "file", accept: ".csv", label: "Raw MTR CSV (XSwift export)" },
      { name: "consignment_xlsx", type: "file", accept: ".xlsx", label: "AT Consignment Report (.xlsx)" },
      { name: "primary_plants_xlsx", type: "file", accept: ".xlsx", label: "Primary Plants List (.xlsx)" },
    ],
  },
  mapping_issue: {
    label: "Mapping Issue",
    fields: [
      { name: "run_date_label", type: "text", label: 'Run date label (e.g. "20 July")', placeholder: "20 July" },
      { name: "xswift_live_dashboard_xlsx", type: "file", accept: ".xlsx", label: "XSwift Live Trip Dashboard export" },
      { name: "at_live_dashboard_xlsx", type: "file", accept: ".xlsx", label: "AT Live Dashboard export" },
      { name: "primary_plants_xlsx", type: "file", accept: ".xlsx", label: "Primary Plants List (.xlsx)" },
    ],
  },
  vehicle_status: {
    label: "Vehicle Status",
    fields: [
      { name: "run_date_label", type: "text", label: 'Run date label (used in the output filename, e.g. "22 July")', placeholder: "22 July" },
      { name: "xswift_live_dashboard_xlsx", type: "file", accept: ".xlsx", label: "XSwift Live Trip Dashboard export" },
      { name: "at_live_dashboard_xlsx", type: "file", accept: ".xlsx", label: "AT Live Dashboard export" },
    ],
  },
};

const tabsEl = document.getElementById("tabs");
const fieldsContainer = document.getElementById("fieldsContainer");
const form = document.getElementById("jobForm");
const statusEl = document.getElementById("status");
const errorEl = document.getElementById("error");
const filesEl = document.getElementById("files");
const submitBtn = document.getElementById("submitBtn");
let pollHandle = null;
let activeReport = "mtr_analysis";

function renderTabs() {
  tabsEl.innerHTML = Object.entries(REPORTS).map(
    ([key, r]) => `<div class="tab ${key === activeReport ? "active" : ""}" data-report="${key}">${r.label}</div>`
  ).join("");
  tabsEl.querySelectorAll(".tab").forEach((el) => {
    el.addEventListener("click", () => {
      activeReport = el.dataset.report;
      renderTabs();
      renderFields();
    });
  });
}

function renderFields() {
  const report = REPORTS[activeReport];
  fieldsContainer.innerHTML = report.fields.map((f) => {
    if (f.type === "text") {
      return `<label>${f.label}</label><input type="text" name="${f.name}" required placeholder="${f.placeholder || ""}" />`;
    }
    return `<label>${f.label}</label><input type="file" name="${f.name}" accept="${f.accept}" required />`;
  }).join("");
  statusEl.innerHTML = "";
  errorEl.textContent = "";
  filesEl.innerHTML = "";
}

function setStatus(text, cls) {
  statusEl.innerHTML = text ? `<span class="pill ${cls}">${text}</span>` : "";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorEl.textContent = "";
  filesEl.innerHTML = "";
  submitBtn.disabled = true;
  setStatus("uploading...", "queued");

  const formData = new FormData(form);
  formData.append("report", activeReport);
  try {
    const res = await fetch(`${API}/jobs`, { method: "POST", body: formData });
    if (!res.ok) throw new Error((await res.json()).detail || "Upload failed");
    const { job_id } = await res.json();
    setStatus("queued", "queued");
    pollHandle = setInterval(() => pollJob(job_id), 4000);
  } catch (err) {
    errorEl.textContent = err.message;
    setStatus("failed", "failed");
    submitBtn.disabled = false;
  }
});

let consecutiveFailures = 0;
const MAX_CONSECUTIVE_FAILURES = 5; // tolerate transient network blips during the multi-minute poll

async function pollJob(jobId) {
  try {
    const res = await fetch(`${API}/jobs/${jobId}`);
    if (!res.ok) throw new Error("Job not found");
    const job = await res.json();
    consecutiveFailures = 0;
    errorEl.textContent = ""; // clear any stale error from an earlier transient blip
    setStatus(job.status, job.status);

    if (job.status === "done") {
      clearInterval(pollHandle);
      submitBtn.disabled = false;
      filesEl.innerHTML = job.output_files.map(
        (f) => `<li><a href="${API}/jobs/${jobId}/download/${encodeURIComponent(f)}">Download ${f}</a></li>`
      ).join("");
    } else if (job.status === "failed") {
      clearInterval(pollHandle);
      submitBtn.disabled = false;
      errorEl.textContent = job.error || "Job failed";
    }
  } catch (err) {
    consecutiveFailures += 1;
    if (consecutiveFailures >= MAX_CONSECUTIVE_FAILURES) {
      clearInterval(pollHandle);
      submitBtn.disabled = false;
      errorEl.textContent = `Lost connection while checking status: ${err.message}`;
    }
    // otherwise: transient blip, keep polling silently
  }
}

renderTabs();
renderFields();
</script>
</body>
</html>
