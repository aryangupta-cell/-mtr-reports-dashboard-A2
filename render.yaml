services:
  - type: web
    name: mtr-reports-dashboard
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --app-dir backend --timeout-keep-alive 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
